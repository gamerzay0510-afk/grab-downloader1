name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.37
        pip install kivy==2.3.0
        pip install python-for-android
    
    - name: Build APK
      run: |
        p4a apk --debug --private /home/runner/work/grab-downloader1 \
          --name grabdownloader \
          --package org.grab.grabdownloader \
          --version 4.0 \
          --requirements python3,kivy \
          --android-api 31 \
          --android-min-api 21
        find /home/runner/.local/share/python-for-android -name "*.apk" 2>/dev/null
      shell: bash
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: grabdownloader-apk
        path: /home/runner/.local/share/python-for-android/*.apk
