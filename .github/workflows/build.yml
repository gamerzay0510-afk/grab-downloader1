name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivyteam/kivy:python3.11
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up environment
      run: |
        export ANDROID_HOME=/opt/android-sdk
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25b
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_NDK_HOME
        pip install --upgrade pip buildozer
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
    
    - name: Build APK
      run: |
        buildozer android debug
        ls -la bin/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: grabdownloader-apk
        path: bin/*.apk
